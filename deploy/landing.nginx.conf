# Internal nginx config for the landing-frontend container.
# Serves the static SPA at the container root; shared-nginx proxies `/` here.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets — safe to cache hard.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /favicon.svg {
        access_log off;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # SPA fallback — never cache the HTML shell.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;
}
