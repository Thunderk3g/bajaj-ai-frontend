# ADD THIS BLOCK to ai-infra's shared nginx.conf (shared-nginx), inside the existing
# `server { listen 80; ... }` block, AFTER the specific agent locations.
#
# Why after: nginx selects the longest-matching prefix, so `/compliance`, `/compliance/api/`,
# `/pgadmin/`, `/seo/` (when enabled) and the exact `= /health` all still win. This `location /`
# only catches everything else — i.e. the platform home and its hashed assets — closing the
# 404 gap at the bare root.

location / {
    proxy_pass http://landing-frontend:80;
    include /etc/nginx/proxy_params.conf;   # same include the other agents use
}
