# ADD THIS BLOCK to ai-infra's shared nginx.conf (shared-nginx), inside the existing
# `server { listen 80; ... }` block, AFTER the specific agent locations (after the
# `/pgadmin/` block is a good spot).
#
# Why after: nginx selects the longest-matching prefix, so `/compliance`, `/compliance/api/`,
# `/pgadmin/`, `/seo/` (when enabled) and the `/health` block all still win. This `location /`
# only catches everything else — i.e. the platform home and its hashed assets — closing the
# 404 gap at the bare root.
#
# Why the `set $landing ...; proxy_pass $landing;` form (and NOT `proxy_pass http://landing-frontend:80;`):
# the shared nginx resolves agent hostnames LAZILY at request time (note the `resolver` in the
# server block). A literal upstream hostname is instead resolved when nginx loads its config, so
# if the landing container is down at reload time, `nginx -t` fails and the WHOLE platform reload
# is rejected. The variable form makes a down landing container only 502 on "/" — every other
# route keeps working. This mirrors how the compliance/pgadmin routes are written.

location / {
    set $landing http://landing-frontend:80;
    proxy_pass $landing;
    include /etc/nginx/proxy_params.conf;   # same include the other agents use
}
